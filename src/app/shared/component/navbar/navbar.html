<nav class="custom-navbar bg-white py-3 border-bottom" dir="ltr">
  <div class="container d-flex flex-wrap align-items-center justify-content-between">
    
    <!-- Left Group (Logo + Actions) -->
    <div class="d-flex align-items-center gap-4 gap-lg-5 mb-3 mb-lg-0">
      
      <!-- Logo -->
      <a routerLink="/home" class="brand-logo text-decoration-none">
        <img src="image.png" alt="Pharmacy Marts" class="logo-img">
      </a>

      <!-- Actions -->
      <div class="d-flex align-items-center gap-4 gap-md-5">
        
        <!-- Cart -->
        <a routerLink="/cart" class="nav-action-item text-decoration-none">
          <i class="fa-solid fa-cart-shopping nav-icon"></i>
          <span class="action-text" [dir]="currentLang === 'ar' ? 'rtl' : 'ltr'">{{ currentLang === 'ar' ? 'العربة' : 'Cart' }}</span>
        </a>

        <!-- User Login -->
        <a routerLink="/login" class="nav-action-item text-decoration-none">
          <i class="fa-solid fa-user nav-icon"></i>
          <span class="action-text" [dir]="currentLang === 'ar' ? 'rtl' : 'ltr'">{{ currentLang === 'ar' ? 'تسجيل الدخول' : 'Sign In' }}</span>
        </a>

        <!-- Language Toggle -->
        <div class="nav-action-item pointer" (click)="toggleLang()" style="cursor: pointer;">
          <span class="lang-text">{{ currentLang === 'ar' ? 'EN' : 'AR' }}</span>
          <i class="fa-solid fa-chevron-down chevron-icon"></i>
        </div>

      </div>
    </div>

    <!-- Center/Right Nav Links -->
    <div class="d-flex align-items-center gap-4 ms-auto me-4 fw-bold">
      <a routerLink="/product" class="text-decoration-none text-dark">Product</a>
      <a routerLink="/Wishlist" class="text-decoration-none text-dark">Wishlist</a>
    </div>

    <!-- Right Group (Search Bar) -->
    <div class="search-container">
      <div class="search-box position-relative" [dir]="currentLang === 'ar' ? 'rtl' : 'ltr'">
        <input type="text" class="form-control rounded-pill search-input" [placeholder]="currentLang === 'ar' ? 'إبحث' : 'Search'">
        <i class="fa-solid fa-magnifying-glass search-icon position-absolute top-50 translate-middle-y"></i>
      </div>
    </div>

  </div>
</nav>
