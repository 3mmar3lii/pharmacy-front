<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-illustration-side">
      <img [src]="isLogin ? '/login-illustration.png' : '/register-illustration.png'" alt="Illustration" class="illustration-img" />
    </div>
    
    <div class="auth-form-side">
      <div class="auth-header">
        <div class="lang-dropdown-container">
          <button class="lang-toggle" (click)="toggleDropdown()">
            {{ currentLang === 'ar' ? 'AR' : 'EN' }}
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          <div class="lang-dropdown-menu" *ngIf="isDropdownOpen">
            <div class="lang-option" (click)="selectLanguage('ar')">AR</div>
            <div class="lang-option" (click)="selectLanguage('en')">EN</div>
          </div>
        </div>

        <div class="auth-tabs" *ngIf="currentLang === 'ar'">
          <a routerLink="/login" class="tab" [class.active]="isLogin">تسجيل الدخول</a>
          <a routerLink="/register" class="tab" [class.active]="!isLogin">{{ isLogin ? 'افتح حساب جديد' : 'بيانات الاتصال' }}</a>
        </div>
        <div class="auth-tabs" *ngIf="currentLang === 'en'">
          <a routerLink="/login" class="tab" [class.active]="isLogin">Sign In</a>
          <a routerLink="/register" class="tab" [class.active]="!isLogin">Sign Up</a>
        </div>
      </div>

      <div class="auth-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
