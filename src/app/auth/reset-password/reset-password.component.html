<div class="form-container fade-in text-center">
  <div class="mb-8">
    <h1 class="auth-title">{{ currentLang === 'ar' ? 'إعادة تعيين كلمة السر' : 'Reset Password' }}</h1>
    <p class="auth-subtitle mt-2">
      {{ currentLang === 'ar' ? 'أدخل كلمة سر جديدة قوية.' : 'Enter a new strong password.' }}
    </p>
  </div>

  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div class="auth-input-group text-start">
      <label class="input-label">{{ currentLang === 'ar' ? 'كلمة السر الجديدة' : 'New Password' }}</label>
      <input type="password" formControlName="password" />
    </div>

    <div class="auth-input-group text-start">
      <label class="input-label">{{ currentLang === 'ar' ? 'تأكيد كلمة السر' : 'Confirm Password' }}</label>
      <input type="password" formControlName="passwordConfirm" />
    </div>

    <div *ngIf="errorMessage" class="error-text text-danger mt-2 text-start">
      <small>{{ errorMessage }}</small>
    </div>

    <button type="button" class="auth-btn-primary mt-4" [disabled]="!resetForm.valid" (click)="onSubmit()">
      {{ currentLang === 'ar' ? 'حفظ' : 'Save Changes' }}
    </button>
  </form>
</div>
